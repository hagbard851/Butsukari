// The year as the judo calendar sees it: two long judo seasons (fall, winter),
// two short gym seasons (spring rebuild, summer build). No dates in the UI —
// boundaries exist only so the pacing math has something to divide by.
const SEASONS = [
  { id: "winter", name: "WINTER", kanji: "\u51AC", startMonth: 0, purpose: "JUDO SEASON \u00B7 MAINTAIN", mode: "maintain", tier: "7",  color: "#5AA0E0" },

];
function seasonAt(d = new Date()) {
  const m = d.getMonth();
  let cur = SEASONS[0];
  for (const s of SEASONS) if (m >= s.startMonth) cur = s;
  return cur;
}
function nextSeason(d = new Date()) {
  const i = SEASONS.indexOf(seasonAt(d));
  return SEASONS[(i + 1) % SEASONS.length];
}
function seasonEnd(d = new Date()) {
  const s = seasonAt(d), n = nextSeason(d);
  const y = n.startMonth > s.startMonth ? d.getFullYear() : d.getFullYear() + 1;
  return new Date(y, n.startMonth, 1);
}
function weeksLeftInSeason(d = new Date()) {
  return Math.max(0.1, (seasonEnd(d) - d) / (86400000 * 7));
}

// Resolve the exercise list for a session at start time.
// Returns exercise clones with tier-adjusted set counts already applied.
function getTierList(wid, tier, sessions) {
  let ids;
  if (wid === "T" || wid === "P") {
    ids = WORKOUTS[wid].exercises.map(e => e.id);
  } else {
    ids = [...(TIERS[tier] && TIERS[tier][wid] ? TIERS[tier][wid] : TIERS['9'][wid])];
    // Season-7 Day A rotating finisher.
    // Only tier-7 sessions participate: 9/11 days always include farmer, so
    // consulting them would bias the rotation. No tier-7 history → farmer first.
    if (wid === "A" && tier === '7') {
      const last7A = [...sessions].filter(s => s.wid === "A" && s.tier === '7' && s.entries).sort((x, y) => new Date(y.date) - new Date(x.date))[0];
      const didFarmer = last7A && last7A.entries['farmer'] && last7A.entries['farmer'].done;
      ids = ids.concat(didFarmer ? ["hang", "plank-a"] : ["farmer"]);
    }
    // Pull-up graduation: assist reached 0 → bodyweight reps
    if (CFG.pullupsBW) ids = ids.map(id => id === "pullups" ? "pull-bw" : id);
    // Hammer curl corrective — every A/B day, outside the count
    ids.push(wid === "A" ? "hammer-curl" : "hammer-curl-b");
  }
  const setsOv = TIER_SETS[tier] || {};
  return ids.map(id => EX_BY_ID[id]).filter(Boolean).map(e => ({ ...e, sets: setsOv[e.id] || e.sets }));
}

// ─── DURABLE STORAGE ──────────────────────────────────────────────────────────
// IndexedDB is the primary store (survives storage pressure once persisted);
// localStorage stays as a write-through mirror and one-time migration source.
const IDB = {
  _p: null,
  open() {
    if (this._p) return this._p;
    this._p = new Promise(res => {
      try {
        const rq = indexedDB.open("lobo-gym-db", 1);
        rq.onupgradeneeded = () => rq.result.createObjectStore("kv");
        rq.onsuccess = () => res(rq.result);
        rq.onerror = () => res(null);
      } catch {
        res(null);
      }
    });
    return this._p;
  },
  async get(k) {
    const db = await this.open();
    if (!db) return null;
    return new Promise(res => {
      try {
        const rq = db.transaction("kv").objectStore("kv").get(k);
        rq.onsuccess = () => res(rq.result === undefined ? null : rq.result);
        rq.onerror = () => res(null);
      } catch {
        res(null);
      }
    });
  },
  async set(k, v) {
    const db = await this.open();
    if (!db) return;
    try {
      db.transaction("kv", "readwrite").objectStore("kv").put(v, k);
    } catch {}
  },
  async del(k) {
    const db = await this.open();
    if (!db) return;
    try {
      db.transaction("kv", "readwrite").objectStore("kv").delete(k);
    } catch {}
  }
};
const DB = {
  async get(k) {
    const v = await IDB.get(k);
    if (v !== null && v !== undefined) return v;
    return LS.get(k); // fallback / migration source

  set(k, v) {
    LS.set(k, v);
    IDB.set(k, v);
  },
  del(k) {
    LS.del(k);
    IDB.del(k);
  }
};

function getHistory(sessions, id, altId = null, field = "weight") {
  const result = [];
  for (const s of sessions) {
    const e = s.entries?.[id] ?? (altId ? s.entries?.[altId] : null);
    if (e && e[field] != null && e[field] !== "") result.push({
      date: s.date,
      weight: Number(e[field]),
      setsCompleted: e.sets || 0,
      reqSets: e.req || null
    });
  }
  return result.sort((a, b) => new Date(a.date) - new Date(b.date));
}
function getLastW(sessions, id, altId = null, field = "weight") {
  const h = getHistory(sessions, id, altId, field);
  return h.length > 0 ? h[h.length - 1].weight : null;
}

// ─── PROGRESSION ──────────────────────────────────────────────────────────────
// Core progression logic shared by whole exercises and Row parts.
// "Completed" means: sets done >= the sets that were REQUIRED that session
// (stored per-entry as `req` since tiers can lower set counts), falling back
// to the exercise's default when req is absent (pre-v14 history).
function smartCore(history, prog, ex, defaultSets, startW) {
  const unitW = ex.trackTime ? "sec" : ex.trackReps ? "reps" : "lbs";
  const doneOf = h => h.setsCompleted >= (h.reqSets || defaultSets);
  if (history.length === 0) return {
    currentWeight: startW,
    nextWeight: null,
    status: 'initial',
    label: 'START',
    color: '#88847F',
    tip: 'First session — log your working weight.'
  };
  const last = history[history.length - 1];
  const cw = last.weight;
  const lastCompleted = doneOf(last);
  const nw = prog.down ? Math.max(0, cw - prog.inc) : cw + prog.inc;
  const recent = history.slice(-3);
  const plateau = recent.length >= 3 && recent.every(h => h.weight === cw) && recent.every(h => !doneOf(h));
  let streak = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i].weight === cw && doneOf(history[i])) streak++;
    else break;
  }
  if (plateau) {
    const dw = Math.max(0, round2_5(prog.down ? cw * 1.1 : cw * 0.9));
    return {
      currentWeight: cw,
      nextWeight: dw,
      status: 'deload',
      label: 'DELOAD',
      color: '#E05858',
      tip: `Same weight, incomplete sets × 3 sessions. Deload to ${dw} ${ex.unit || unitW} — recovery then reload.`
    };
  }
  if (lastCompleted && streak >= 2) return {
    currentWeight: cw,
    nextWeight: nw,
    status: 'ready',
    label: prog.down ? 'READY ↓' : 'READY ↑',
    color: '#4EC97A',
    streak,
    tip: `${streak} consecutive completions — ${prog.down ? `reduce assist by ${prog.inc} lbs` : `add ${prog.inc} ${unitW}`} next session.`
  };
  if (lastCompleted && streak === 1) return {
    currentWeight: cw,
    nextWeight: nw,
    status: '1of2',
    label: '1 OF 2',
    color: '#E8952A',
    tip: `All sets done once. One more session at ${cw} ${ex.unit} — then move to ${nw}.`
  };
  return {
    currentWeight: cw,
    nextWeight: null,
    status: 'hold',
    label: 'HOLD',
    color: '#88847F',
    tip: `${last.setsCompleted}/${last.reqSets || defaultSets} sets completed. Hit all sets before progressing.`
  };
}
function getSmartNext(sessions, ex) {
  if (ex.bw || ex.w === null || ex.parts) return null;
  const prog = PROG[ex.id];
  if (!prog) return null;
  const history = getHistory(sessions, ex.id, ex.alt);
  return smartCore(history, prog, ex, ex.sets, ex.w);
}
// Row-style parts: each part has its own field, increment and history stream.
// Note: part completion uses the WHOLE exercise's set count (all 4 row sets),
// since a single sets counter covers both parts.
function getSmartNextPart(sessions, ex, part) {
  const history = getHistory(sessions, ex.id, part.alt, part.field);
  return smartCore(history, { inc: part.inc, down: !!part.down }, ex, ex.sets, part.w);
}
function getStats(sessions, id, target = null, down = false, altId = null) {
  const hist = getHistory(sessions, id, altId);
  if (hist.length === 0) return null;
  const current = hist[hist.length - 1].weight;
  const pr = down ? Math.min(...hist.map(h => h.weight)) : Math.max(...hist.map(h => h.weight));
  const isPR = current === pr;
  if (hist.length < 2) return {
    current,
    pr,
    isPR,
    ratePerWeek: null
  };
  const sample = hist.slice(-8);
  const n = sample.length;
  const t0 = new Date(sample[0].date).getTime();
  const xs = sample.map(h => (new Date(h.date).getTime() - t0) / (86400000 * 7));
  const ys = sample.map(h => h.weight);
  const sx = xs.reduce((a, b) => a + b, 0),
    sy = ys.reduce((a, b) => a + b, 0);
  const sxx = xs.reduce((a, b) => a + b * b, 0),
    sxy = xs.reduce((a, v, i) => a + v * ys[i], 0);
  const slope = (n * sxy - sx * sy) / (n * sxx - sx * sx || 1);
  let projection = null;
  if (target != null && slope !== 0) {
    const weeksToSep = (cfgDeadline() - new Date()) / (86400000 * 7);
    if (weeksToSep <= 0) {
      // Season boundary has passed — no pace math, just flag the cycle as ended.
      return { current, pr, isPR, ratePerWeek: Math.round(slope * 10) / 10, projection: { expired: true } };
    }
    const remaining = down ? current - target : target - current;
    const effectiveSlope = down ? -slope : slope;
    if (effectiveSlope > 0) {
      const weeksNeeded = remaining / effectiveSlope;
      projection = {
        weeksNeeded: Math.round(weeksNeeded),
        onTrack: weeksNeeded <= weeksToSep,
        weeksOff: Math.round(Math.abs(weeksToSep - weeksNeeded))
      };
    } else {
      projection = {
        stalled: true
      };
    }
  }
  return {
    current,
    pr,
    isPR,
    ratePerWeek: Math.round(slope * 10) / 10,
    projection
  };
}
